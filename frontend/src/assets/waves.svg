<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" preserveAspectRatio="xMidYMid slice" width="1200" height="500" aria-hidden="true" focusable="false">
  <!--
    AXUM background waves — DECORATIVE BACKGROUND ONLY.
    16 sinuous horizontal strands stacked vertically with alternating
    amplitudes/phases. Stroke #1a1a1a at stroke-opacity 0.08 → worst-case pixel
    on white is ≈ rgb(228,228,228); body text on #111 still clears 17:1.
    No animation, no <title>/<desc>. Hidden under forced-colors / print /
    reduced-transparency / ≤640px.
  -->
